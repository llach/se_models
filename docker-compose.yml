version: '3.8'

services:
  grounding_dino:
    build:
      context: .
      dockerfile: models/grounding_dino/Dockerfile
      args:
        USERNAME: ${DOCKER_USER:-user}
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    image: grounding_dino:latest
    container_name: grounding_dino
    runtime: nvidia
    ports:
      - "${GROUNDING_DINO_PORT:-8000}:8080"
    volumes:
      - ./weights:/home/user/app/weights
    privileged: true

  sam2:
    build:
      context: .
      dockerfile: models/sam2/Dockerfile
      args:
        USERNAME: ${DOCKER_USER:-user}
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    image: sam2:latest
    container_name: sam2
    runtime: nvidia
    ports:
      - "${SAM2_PORT:-8001}:8080"
    volumes:
      - ./weights:/home/user/app/weights
    privileged: true